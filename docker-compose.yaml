# Stack de démo pour la formation Clean Architecture
# Identifiants BIDON, volontairement triviaux : ne JAMAIS utiliser en prod.
# Lancer :  docker compose up -d
# Arrêter : docker compose down        (garde les données)
# Reset :   docker compose down -v     (supprime aussi le volume)

services:
  postgres:
    image: postgres:17-alpine
    container_name: cleanarchi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: toto
      POSTGRES_PASSWORD: toto
      POSTGRES_DB: cleandb
    ports:
      - "5432:5432"            # exposé sur localhost:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./insert.sql:/docker-entrypoint-initdb.d/insert.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toto -d cleandb"]
      interval: 5s
      timeout: 3s
      retries: 5

  # UI web pour visualiser la base pendant la démo -> http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: cleanarchi-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    

volumes:
  pgdata: